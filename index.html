<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Financeira Premium</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#facc15">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* ========================= TEMA ========================= */
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --primary: #22c55e;
  --accent: #facc15;
  --danger: #ef4444;
}

.light-mode {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #1e293b;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:var(--bg);color:var(--text);transition:0.3s}

/* HEADER */
h1{text-align:center;padding:15px;background:#111827;color:var(--accent)}

/* TEMA */
.theme-btn{
position:fixed;top:10px;right:10px;
background:var(--accent);
padding:8px;border-radius:10px;cursor:pointer
}

/* TABS */
.tab-menu{display:flex;justify-content:center;background:var(--card)}
.tab-menu button{background:none;border:none;color:var(--text);padding:12px;cursor:pointer}
.tab-menu .active{border-bottom:3px solid var(--accent)}

/* CONTEÚDO */
.tab-content>div{display:none;padding:15px}
.tab-content>.active{display:block}

/* DASHBOARD */
.dashboard-cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* BOTÕES */
button{
padding:10px;border:none;border-radius:10px;
font-weight:bold;cursor:pointer
}

.export{background:var(--primary);color:#fff}

/* FORM */
form{
background:var(--card);
padding:15px;border-radius:12px;
display:flex;flex-direction:column;gap:10px
}

input{
padding:10px;border-radius:10px;border:none;
background:#334155;color:#fff
}

/* CLIENTES */
#lista{display:grid;gap:10px}

.cliente{
background:var(--card);
padding:12px;border-radius:12px;
}

.btn-group{display:flex;gap:5px;margin-top:10px}
.btn-group button{flex:1}

/* MODAL */
.modal{
display:none;position:fixed;inset:0;
background:#0008;justify-content:center;align-items:center
}
.modal.active{display:flex}

.modal-content{
background:var(--card);
padding:20px;border-radius:12px;
}

/* TOAST */
#toast{
position:fixed;bottom:20px;right:20px;
background:var(--accent);color:#000;
padding:10px;border-radius:10px;display:none
}

</style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<h1>💰 Financeira Premium</h1>

<div class="tab-menu">
<button class="active" data-tab="dashboard">Dashboard</button>
<button data-tab="cadastro">Cadastro</button>
<button data-tab="clientes">Clientes</button>
</div>

<div class="tab-content">

<div id="dashboard" class="active">

<button class="export" onclick="exportarExcel()">📊 Exportar Excel</button>

<div class="dashboard-cards">
<div class="card"><strong>Emprestado</strong><span id="totalEmprestado"></span></div>
<div class="card"><strong>Recebido</strong><span id="totalRecebido"></span></div>
<div class="card"><strong>Juros</strong><span id="jurosRecebidos"></span></div>
<div class="card"><strong>Lucro</strong><span id="lucro"></span></div>
</div>

</div>

<div id="cadastro">
<form id="formCadastro">
<input id="nome" placeholder="Nome" required>
<input id="telefone" placeholder="Telefone">
<input id="valor" type="number" placeholder="Valor" required>
<input id="juros" type="number" placeholder="Juros %" required>
<button>Salvar</button>
</form>
</div>

<div id="clientes">
<div id="lista"></div>
</div>

</div>

<div id="modal" class="modal">
<div class="modal-content">
<input id="valorPagamento" type="number" placeholder="Valor">
<button onclick="confirmarPagamento()">Confirmar</button>
<button onclick="fecharModal()">Cancelar</button>
</div>
</div>

<div id="toast"></div>

<script>

/* PWA */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

/* TEMA */
if(window.matchMedia('(prefers-color-scheme: light)').matches){
document.body.classList.add("light-mode");
}

function toggleTheme(){
document.body.classList.toggle("light-mode");
}

/* TABS */
const tabs=document.querySelectorAll(".tab-menu button");
const contents=document.querySelectorAll(".tab-content>div");

tabs.forEach(t=>t.onclick=()=>{
tabs.forEach(x=>x.classList.remove("active"));
contents.forEach(x=>x.classList.remove("active"));
t.classList.add("active");
document.getElementById(t.dataset.tab).classList.add("active");
});

/* DADOS */
let clientes=JSON.parse(localStorage.getItem("clientes"))||[];
let clienteAtual=null;

function salvar(){localStorage.setItem("clientes",JSON.stringify(clientes));}

function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* CADASTRO */
document.getElementById("formCadastro").onsubmit=e=>{
e.preventDefault();

const nome=document.getElementById("nome").value;
const telefone=document.getElementById("telefone").value;
const valor=parseFloat(document.getElementById("valor").value);
const juros=parseFloat(document.getElementById("juros").value);

if(valor<=0||juros<0)return toast("Valores inválidos");

clientes.push({
id:Date.now(),
nome,telefone,
valorInicial:valor,
saldoDevedor:valor,
juros,
historico:[]
});

salvar();
render();
e.target.reset();
toast("Cliente adicionado");
};

/* RENDER */
function render(){
const lista=document.getElementById("lista");

lista.innerHTML=clientes.map(c=>{
const jurosPago=c.historico.reduce((a,h)=>a+h.pagoJuros,0);

return `
<div class="cliente">
<strong>${c.nome}</strong>
<p>Saldo: R$ ${c.saldoDevedor.toFixed(2)}</p>
<p>Juros pagos: R$ ${jurosPago.toFixed(2)}</p>

<div class="btn-group">
<button onclick="abrirModal(${c.id})">Pagar</button>
<button onclick="excluir(${c.id})">Excluir</button>
<button onclick="zap(${c.id})">Whats</button>
</div>
</div>`;
}).join("");

dashboard();
}

/* PAGAMENTO */
function abrirModal(id){
clienteAtual=id;
document.getElementById("modal").classList.add("active");
}

function fecharModal(){
document.getElementById("modal").classList.remove("active");
}

function confirmarPagamento(){
const c=clientes.find(x=>x.id===clienteAtual);
const valor=parseFloat(document.getElementById("valorPagamento").value);

const jurosParcela=c.valorInicial*(c.juros/100);

const pagoJuros=Math.min(valor,jurosParcela);
const pagoPrincipal=Math.min(valor-pagoJuros,c.saldoDevedor);

c.saldoDevedor-=pagoPrincipal;

c.historico.push({
data:new Date().toLocaleDateString(),
valorPago:valor,
pagoJuros,
pagoPrincipal,
saldoRestante:c.saldoDevedor
});

salvar();
fecharModal();
render();
toast("Pagamento registrado");
}

/* EXCLUIR */
function excluir(id){
clientes=clientes.filter(c=>c.id!==id);
salvar();
render();
}

/* WHATS */
function zap(id){
const c=clientes.find(x=>x.id===id);
window.open(`https://wa.me/${c.telefone}?text=Saldo R$ ${c.saldoDevedor}`);
}

/* DASHBOARD */
function dashboard(){
let emp=0,rec=0,juros=0;

clientes.forEach(c=>{
emp+=c.valorInicial;
c.historico.forEach(h=>{
rec+=h.valorPago;
juros+=h.pagoJuros;
});
});

document.getElementById("totalEmprestado").innerText=emp.toFixed(2);
document.getElementById("totalRecebido").innerText=rec.toFixed(2);
document.getElementById("jurosRecebidos").innerText=juros.toFixed(2);
document.getElementById("lucro").innerText=juros.toFixed(2);
}

/* EXCEL */
function exportarExcel(){

const dadosClientes=clientes.map(c=>({
Nome:c.nome,
Telefone:c.telefone,
Valor:c.valorInicial,
Saldo:c.saldoDevedor,
Juros:c.juros
}));

let hist=[];
clientes.forEach(c=>{
c.historico.forEach(h=>{
hist.push({
Cliente:c.nome,
Data:h.data,
Valor:h.valorPago,
Juros:h.pagoJuros,
Principal:h.pagoPrincipal,
Saldo:h.saldoRestante
});
});
});

const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(dadosClientes),"Clientes");
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(hist),"Historico");

XLSX.writeFile(wb,"backup_financeira.xlsx");
}

render();

</script>

</body>
</html>
