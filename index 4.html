<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no" />
<title>Financeira Premium - Mobile Friendly</title>
<style>
  /* RESET */
  * {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
  body {background:linear-gradient(135deg,#1e1e2f,#3e3e5e); color:#fff; min-height:100vh; display:flex; flex-direction:column;}
  h1 {padding:15px; text-align:center; background-color:#222744; font-weight:700; font-size:1.6rem; letter-spacing:1px; box-shadow:0 4px 8px rgb(0 0 0 / 0.4);}

  /* MENU DE ABAS */
  .tab-menu {display:flex; flex-wrap:wrap; justify-content:center; background:#2b2b50; box-shadow:inset 0 -3px 0 #ffcc00;}
  .tab-menu button {background:transparent; border:none; color:#ddd; padding:12px 18px; cursor:pointer; font-weight:600; font-size:0.95rem; transition: color 0.3s, border-bottom 0.3s; border-bottom:3px solid transparent;}
  .tab-menu button:hover {color:#ffcc00;}
  .tab-menu button.active {border-bottom:3px solid #ffcc00; color:#ffcc00;}

  /* CONTEÚDO DAS ABAS */
  .tab-content {flex-grow:1; padding:15px; max-width:100%; margin:10px auto 30px auto;}
  .tab-content > div {display:none;}
  .tab-content > div.active {display:block;}

  /* DASHBOARD */
  .dashboard-cards {display:flex; flex-wrap:wrap; gap:15px; justify-content:space-between; margin-bottom:25px;}
  .dashboard-cards .card {flex:1 1 calc(48% - 12px); min-width:140px; background:#3b3b70; padding:15px; border-radius:12px; text-align:center; box-shadow:0 5px 15px rgb(0 0 0 / 0.4);}
  .dashboard-cards .card strong {display:block; font-size:1.1rem; margin-bottom:4px; color:#ffcc00;}
  .dashboard-cards .card span {font-size:1.4rem; font-weight:700; color:#fff;}
  .dashboard-graph {width:100%;}
  .dashboard-graph .card {padding:12px;}

  /* FORMULÁRIO DE CADASTRO */
  form {background:#2b2b50; padding:20px; border-radius:12px; box-shadow:0 6px 18px rgb(0 0 0 / 0.4); max-width:100%; margin:0 auto; display:flex; flex-direction:column; gap:12px;}
  form input, form select {padding:10px 12px; border-radius:8px; border:none; font-size:0.95rem; background:#444c73; color:#fff;}
  form input::placeholder, form select {color:#ccc;}
  form input:focus, form select:focus {outline:none; background:#5661a3;}
  form button {background:#ffcc00; color:#1e1e2f; font-weight:700; padding:10px; border-radius:8px; cursor:pointer; border:none; font-size:1rem; transition:background 0.3s;}
  form button:hover {background:#e6b800;}

  /* LISTA DE CLIENTES */
  #lista {max-width:100%; margin:0 auto; display:grid; grid-template-columns:1fr; gap:15px;}
  .cliente {background:#3b3b70; padding:15px; border-radius:12px; box-shadow:0 6px 18px rgb(0 0 0 / 0.4); display:flex; flex-direction:column; gap:6px; position:relative;}
  .cliente .status {position:absolute; top:10px; right:10px; padding:5px 10px; border-radius:12px; font-weight:700; font-size:0.75rem; user-select:none;}
  .status.em-dia {background:#28a745; color:#e6ffea;}
  .status.proximo {background:#ffc107; color:#1e1e2f;}
  .status.atrasado {background:#dc3545; color:#ffe6e6;}
  .cliente strong {font-size:1.2rem; color:#ffcc00;}
  .cliente p {font-size:0.85rem; line-height:1.3;}
  .cliente small {font-size:0.75rem; color:#bbb;}

  /* BOTÕES CLIENTE */
  .cliente .btn-group {margin-top:10px; display:flex; flex-wrap:wrap; gap:6px;}
  .cliente button {flex:1; padding:8px; border:none; border-radius:6px; cursor:pointer; font-weight:700; font-size:0.85rem; transition:background 0.3s; color:#1e1e2f;}
  .cliente .btn-pagamento {background:#ffcc00;}
  .cliente .btn-editar {background:#ffc107;}
  .cliente .btn-excluir {background:#dc3545; color:white;}
  .cliente .btn-whatsapp {background:#25d366; color:white;}
  .cliente button:hover {opacity:0.85;}

  /* MODAL */
  .modal {display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:9999; padding:10px;}
  .modal.active {display:flex;}
  .modal-content {background:#3b3b70; padding:20px; border-radius:15px; width:100%; max-width:320px; box-shadow:0 6px 18px rgb(0 0 0 / 0.4); display:flex; flex-direction:column; gap:15px; text-align:center;}
  .modal-content input {padding:10px 12px; border-radius:8px; border:none; font-size:0.95rem; background:#5661a3; color:white;}
  .modal-content button {padding:10px 0; font-weight:700; border-radius:8px; cursor:pointer; border:none; font-size:1rem; background:#ffcc00; color:#1e1e2f; transition:background 0.3s;}
  .modal-content button:hover {background:#e6b800;}

  /* TOAST */
  #toast {position:fixed; top:15px; right:15px; background:#ffcc00; color:#1e1e2f; padding:10px 18px; border-radius:10px; font-weight:700; box-shadow:0 5px 15px rgb(0 0 0 / 0.4); display:none; z-index:10000;}

  /* RESPONSIVO iPhone / Mobile */
  @media(max-width:480px){
    h1{font-size:1.4rem; padding:12px;}
    .dashboard-cards .card{flex:1 1 100%; min-width:auto;}
    .dashboard-cards{gap:12px;}
    .cliente p{font-size:0.8rem;}
    .cliente .btn-group button{font-size:0.8rem; padding:6px;}
    form input, form select{font-size:0.9rem; padding:8px;}
    form button{font-size:0.95rem; padding:8px;}
  }
</style>
</head>
<body>

<h1>💰 Financeira Premium</h1>

<div class="tab-menu">
  <button class="active" data-tab="dashboard">Dashboard</button>
  <button data-tab="cadastro">Cadastro</button>
  <button data-tab="clientes">Clientes</button>
</div>

<div class="tab-content">
  <div id="dashboard" class="active">
    <div class="dashboard-cards">
      <div class="card"><strong>Total Emprestado</strong><span id="totalEmprestado">0</span></div>
      <div class="card"><strong>Total Recebido</strong><span id="totalRecebido">0</span></div>
      <div class="card"><strong>Juros Recebidos</strong><span id="jurosRecebidos">0</span></div>
      <div class="card"><strong>Lucro (principal + juros)</strong><span id="lucro">0</span></div>
      <div class="card"><strong>Clientes Atrasados</strong><span id="clientesAtrasados">0</span></div>
    </div>
    <div class="dashboard-graph">
      <div class="card">
        <strong>Evolução Patrimonial</strong>
        <canvas id="graficoPatrimonio" height="150"></canvas>
      </div>
    </div>
  </div>

  <div id="cadastro">
    <form id="formCadastro">
      <input id="nome" type="text" placeholder="Nome *" required />
      <input id="telefone" type="text" placeholder="Telefone" />
      <input id="endereco" type="text" placeholder="Endereço" />
      <input id="email" type="email" placeholder="Email" />
      <input id="valor" type="number" placeholder="Valor emprestado *" min="0" step="0.01" required />
      <input id="juros" type="number" placeholder="Juros (% por parcela) *" min="0" step="0.01" required />
      <select id="periodo" required>
        <option value="semanal">Semanal</option>
        <option value="quinzenal" selected>Quinzenal</option>
        <option value="mensal">Mensal</option>
      </select>
      <button type="submit">Adicionar Cliente</button>
    </form>
  </div>

  <div id="clientes">
    <div id="lista"></div>
  </div>
</div>

<!-- Modal Pagamento -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Registrar Pagamento</h3>
    <input id="valorPagamento" type="number" placeholder="Valor pago" min="0" step="0.01" />
    <button id="btnConfirmarPagamento">Confirmar</button>
    <button id="btnCancelarPagamento" style="background:#dc3545; color:#fff;">Cancelar</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
/* --------------------- Código JS completo --------------------- */
const tabs=document.querySelectorAll('.tab-menu button');
const tabContents=document.querySelectorAll('.tab-content > div');
tabs.forEach(tab=>tab.addEventListener('click',()=>{
  tabs.forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  tabContents.forEach(tc=>tc.classList.remove('active'));
  document.getElementById(tab.dataset.tab).classList.add('active');
}));

const nome=document.getElementById("nome");
const telefone=document.getElementById("telefone");
const endereco=document.getElementById("endereco");
const email=document.getElementById("email");
const valor=document.getElementById("valor");
const juros=document.getElementById("juros");
const periodo=document.getElementById("periodo");
const valorPagamento=document.getElementById("valorPagamento");
const lista=document.getElementById("lista");
const toast=document.getElementById("toast");
const modal=document.getElementById("modal");
const btnConfirmarPagamento=document.getElementById("btnConfirmarPagamento");
const btnCancelarPagamento=document.getElementById("btnCancelarPagamento");

let clientes=JSON.parse(localStorage.getItem("clientes"))||[];
let clienteAtualIndex=null;
let graficoPatrimonio=null;

function atualizarGrafico(){
  const labels=clientes.map((_,i)=>`C${i+1}`);
  const dados=clientes.map(c=>c.valorInicial-(c.saldoDevedor||0));
  const ctx=document.getElementById('graficoPatrimonio').getContext('2d');
  const gradient=ctx.createLinearGradient(0,0,0,150);
  gradient.addColorStop(0,'rgba(255,204,0,0.6)');
  gradient.addColorStop(1,'rgba(255,204,0,0)');
  if(!graficoPatrimonio){
    graficoPatrimonio=new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[{label:'Patrimônio', data:dados, borderColor:'#ffcc00', backgroundColor:gradient, tension:0.4, pointBackgroundColor:'#ffcc00', pointBorderColor:'#fff', pointRadius:5, fill:true}]},
      options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
    });
  } else {graficoPatrimonio.data.labels=labels; graficoPatrimonio.data.datasets[0].data=dados; graficoPatrimonio.update();}
}

function showToast(msg){toast.innerText=msg; toast.style.display='block'; setTimeout(()=>{toast.style.display='none'},3000);}
function salvar(){localStorage.setItem("clientes",JSON.stringify(clientes));}

function calcularStatus(cliente){
  if(!cliente.dataEmprestimo)return"em-dia";
  const hoje=new Date();
  const dtEmprestimo=new Date(cliente.dataEmprestimo);
  const diffDias=Math.floor((hoje-dtEmprestimo)/(1000*60*60*24));
  let prazo=30; if(cliente.periodo==="semanal")prazo=7; else if(cliente.periodo==="quinzenal")prazo=15;
  if(diffDias>prazo)return"atrasado"; if(diffDias>=prazo*0.75)return"proximo"; return"em-dia";
}

function atualizarDashboard(){
  let totalEmprestado=0,totalRecebido=0,totalJurosRecebidos=0,clientesAtrasados=0;
  clientes.forEach(c=>{
    totalEmprestado+=c.valorInicial||0;
    if(c.historico&&c.historico.length){c.historico.forEach(h=>{totalRecebido+=h.valorPago||0; totalJurosRecebidos+=h.pagoJuros||0;});}
    if(calcularStatus(c)==="atrasado")clientesAtrasados++;
  });
  document.getElementById("totalEmprestado").innerText=totalEmprestado.toFixed(2);
  document.getElementById("totalRecebido").innerText=totalRecebido.toFixed(2);
  document.getElementById("jurosRecebidos").innerText=totalJurosRecebidos.toFixed(2);
  document.getElementById("lucro").innerText=(totalRecebido).toFixed(2);
  document.getElementById("clientesAtrasados").innerText=clientesAtrasados;
  atualizarGrafico();
}

function renderClientes(){
  lista.innerHTML="";
  clientes.forEach((c,i)=>{
    const status=calcularStatus(c);
    const statusLabel=status==="em-dia"?"Em dia":status==="proximo"?"Próximo":"Atrasado";
    const jurosTotalPago=c.historico.reduce((acc,p)=>acc+(p.pagoJuros||0),0);
    const principalPago=c.historico.reduce((acc,p)=>acc+(p.pagoPrincipal||0),0);
    const saldoAtual=c.saldoDevedor.toFixed(2);
    const parcelasPagas = c.historico.length;
    const ultimoPagamento = parcelasPagas ? c.historico[c.historico.length-1].valorPago.toFixed(2) : "0.00";

    lista.innerHTML+=`
    <div class="cliente">
      <div class="status ${status}">${statusLabel}</div>
      <strong>${c.nome}</strong>
      <p>📞 ${c.telefone||"N/A"}</p>
      <p>🏠 ${c.endereco||"N/A"}</p>
      <p>✉️ ${c.email||"N/A"}</p>
      <p>💰 Saldo atual: R$ ${saldoAtual}</p>
      <p>💵 Valor emprestado: R$ ${c.valorInicial.toFixed(2)}</p>
      <p>💸 Juros (% por parcela): ${c.juros.toFixed(2)}%</p>
      <p>📅 Periodicidade: ${c.periodo.charAt(0).toUpperCase()+c.periodo.slice(1)}</p>
      <p>📊 Juros pagos: R$ ${jurosTotalPago.toFixed(2)}</p>
      <p>📊 Parcela paga (principal): R$ ${principalPago.toFixed(2)}</p>
      <p>📦 Parcelas pagas: ${parcelasPagas}</p>
      <p>💳 Último pagamento: R$ ${ultimoPagamento}</p>
      <div class="btn-group">
        <button class="btn-pagamento" onclick="abrirModal(${i})">Registrar Pagamento</button>
        <button class="btn-editar" onclick="editarCliente(${i})">Editar</button>
        <button class="btn-excluir" onclick="excluirCliente(${i})">Excluir</button>
        <button class="btn-whatsapp" onclick="enviarWhatsApp(${i})">Enviar WhatsApp</button>
      </div>
    </div>`;
  });
  atualizarDashboard();
  salvar();
}

document.getElementById("formCadastro").addEventListener("submit",e=>{
  e.preventDefault();
  if(!nome.value||!valor.value||!juros.value){showToast("Preencha os campos obrigatórios!"); return;}
  const cliente={nome:nome.value,telefone:telefone.value||"",endereco:endereco.value||"",email:email.value||"",valorInicial:parseFloat(valor.value),saldoDevedor:parseFloat(valor.value),juros:parseFloat(juros.value),periodo:periodo.value,dataEmprestimo:new Date().toISOString(),historico:[]};
  clientes.push(cliente); salvar(); renderClientes(); e.target.reset(); showToast("Cliente adicionado com sucesso!");
  tabs.forEach(t=>t.classList.remove('active')); tabContents.forEach(tc=>tc.classList.remove('active')); tabs[2].classList.add('active'); tabContents[2].classList.add('active');
});

function abrirModal(index){clienteAtualIndex=index; modal.classList.add("active"); valorPagamento.value="";}
btnCancelarPagamento.onclick=()=>{modal.classList.remove("active");}

btnConfirmarPagamento.onclick=()=>{
  const cliente=clientes[clienteAtualIndex];
  const valorPago=parseFloat(valorPagamento.value);
  if(isNaN(valorPago)||valorPago<=0){showToast("Digite um valor válido para o pagamento"); return;}

  // Juros fixos por parcela
  const jurosParcela = cliente.valorInicial * (cliente.juros / 100);
  const pagoJuros = Math.min(valorPago, jurosParcela);
  const pagoPrincipal = Math.min(valorPago - pagoJuros, cliente.saldoDevedor);
  cliente.saldoDevedor -= pagoPrincipal;

  cliente.historico.push({
    data:new Date().toLocaleDateString(),
    valorPago,
    pagoJuros,
    pagoPrincipal
  });

  salvar(); modal.classList.remove("active"); renderClientes(); showToast("Pagamento registrado!");
}

function editarCliente(index){
  const c=clientes[index];
  tabs.forEach(t=>t.classList.remove('active')); tabContents.forEach(tc=>tc.classList.remove('active')); tabs[1].classList.add('active'); tabContents[1].classList.add('active');
  nome.value=c.nome; telefone.value=c.telefone; endereco.value=c.endereco; email.value=c.email; valor.value=c.valorInicial; juros.value=c.juros; periodo.value=c.periodo;
  clientes.splice(index,1); salvar(); renderClientes();
}

function excluirCliente(index){if(confirm(`Excluir cliente "${clientes[index].nome}"? Essa ação é irreversível.`)){clientes.splice(index,1); salvar(); renderClientes(); showToast("Cliente excluído");}}

function enviarWhatsApp(index){
  const c=clientes[index];
  const msg=`Olá ${c.nome}, seu saldo devedor é R$ ${c.saldoDevedor.toFixed(2)}, e sua parcela esta próxima de vencer. Segue minha chave PIX: 47832879000100`;
  const url=`https://api.whatsapp.com/send?phone=${c.telefone.replace(/\D/g,'')}&text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

renderClientes();
</script>
</body>
</html>
